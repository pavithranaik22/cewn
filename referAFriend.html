<!DOCTYPE html>
<html>
<head>
    <title>Refer a Friend</title>
    <link rel="stylesheet" href="referAFriend.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="form-box">

    <h2>Refer a Friend</h2>
    <p>Help your friends find opportunities in the company</p>

    <form id="referralForm">

    <input type="text" id="yourName" placeholder="Your Name" required>
    <input type="email" id="yourEmail" placeholder="Your Email" required>

    <input type="text" id="friendName" placeholder="Friend Name" required>
    <input type="email" id="friendEmail" placeholder="Friend Email" required>

    <input type="text" id="jobTitle" placeholder="Job Title" required>
    <input type="text" id="resumeLink" placeholder="Resume Link" required>

    <button type="submit">Submit Referral</button>

</form>

</div>

<script src="submitReferral.js"></script>

</body>
</html>
